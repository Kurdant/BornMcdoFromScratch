name: Build & Deploy Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.2']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup PHP ${{ matrix.php-version }}
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: json, pdo, pdo_mysql
        coverage: xdebug
    
    - name: Validate composer.json
      run: composer validate --strict
    
    - name: Update composer.lock if needed
      run: composer update --lock --no-interaction
    
    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-${{ matrix.php-version }}-
    
    - name: Install Composer dependencies
      run: composer install --prefer-dist --no-progress
    
    - name: Run PHPUnit tests
      run: ./vendor/bin/phpunit tests/ -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ secrets.REGISTRY_HOST }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.REGISTRY_HOST }}/wcdo-backend:latest
          ${{ secrets.REGISTRY_HOST }}/wcdo-backend:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.REGISTRY_HOST }}/wcdo-backend:buildcache
        cache-to: type=registry,ref=${{ secrets.REGISTRY_HOST }}/wcdo-backend:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup SSH key
      env:
        SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
    
    - name: Deploy to VPS
      env:
        REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
        REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        VPS_USER: ${{ secrets.VPS_USER }}
        VPS_HOST: ${{ secrets.VPS_HOST }}
        VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
      run: |
        ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST << 'DEPLOY_EOF'
        set -e
        
        echo "[Deploy] Starting deployment..."
        
        cd $VPS_APP_PATH
        
        echo "[Deploy] Logging into registry..."
        docker login -u $REGISTRY_USERNAME -p $REGISTRY_PASSWORD $REGISTRY_HOST
        
        echo "[Deploy] Pulling latest image..."
        docker pull $REGISTRY_HOST/wcdo-backend:latest
        
        echo "[Deploy] Restarting services..."
        docker-compose down || true
        docker-compose up -d
        
        echo "[Deploy] Deployment completed successfully!"
        docker ps | grep wcdo
        DEPLOY_EOF
    
    - name: Cleanup SSH key
      if: always()
      run: rm -f ~/.ssh/id_rsa

