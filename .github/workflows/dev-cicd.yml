name: CI/CD - Dev (stark.a3n.fr)

on:
  push:
    branches: [dev]

jobs:
  test-build-deploy:
    name: Test, Build & Deploy on stark.a3n.fr
    runs-on: ubuntu-latest

    steps:
      - name: Test, build, push and deploy via SSH on stark
        uses: appleboy/ssh-action@v1
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        with:
          host: stark.a3n.fr
          username: hugo
          key: ${{ secrets.STARK_SSH_KEY }}
          passphrase: ${{ secrets.STARK_SSH_PASSPHRASE }}
          envs: REGISTRY_USER,REGISTRY_PASSWORD
          script: |
            set -e
            cd /home/hugo/projects/BornMcdoFromScratch2

            git pull origin dev

            composer install --prefer-dist --no-progress

            ./vendor/bin/phpunit tests/

            echo "$REGISTRY_PASSWORD" | docker login hugo-registry.a3n.fr \
              -u "$REGISTRY_USER" --password-stdin

            docker build -t hugo-registry.a3n.fr/wcdo:dev .
            docker push hugo-registry.a3n.fr/wcdo:dev

            docker compose pull
            docker compose up -d

            sleep 10
            docker compose ps --filter status=running
            echo "Deploy on stark done"
