name: CI/CD - Deploy to prod (vision)

on:
  push:
    branches: [prod]

jobs:
  tag-prod-image:
    name: Tag :dev as :prod on registry
    runs-on: self-hosted

    steps:
      - name: Login to registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login hugo-registry.a3n.fr \
            -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Retag dev image as prod
        run: |
          docker pull hugo-registry.a3n.fr/wcdo:dev
          docker tag hugo-registry.a3n.fr/wcdo:dev hugo-registry.a3n.fr/wcdo:prod
          docker push hugo-registry.a3n.fr/wcdo:prod

  deploy-vision:
    name: Deploy :prod on vision.a3n.fr
    needs: tag-prod-image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy config files to vision
        uses: appleboy/scp-action@v0.1.7
        with:
          host: vision.a3n.fr
          username: hugo
          key: ${{ secrets.VISION_SSH_KEY }}
          passphrase: ${{ secrets.VISION_SSH_PASSPHRASE }}
          source: "docker-compose.prod.yml,docker/nginx/nginx.conf,docker/mariadb/init.sql"
          target: /home/hugo/wcdo
          strip_components: 0

      - name: Deploy via SSH on vision
        uses: appleboy/ssh-action@v1
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        with:
          host: vision.a3n.fr
          username: hugo
          key: ${{ secrets.VISION_SSH_KEY }}
          passphrase: ${{ secrets.VISION_SSH_PASSPHRASE }}
          envs: REGISTRY_USER,REGISTRY_PASSWORD
          script: |
            set -e
            cd /home/hugo/wcdo

            # Renommer le compose prod en compose par défaut
            cp docker-compose.prod.yml docker-compose.yml

            echo "$REGISTRY_PASSWORD" | docker login hugo-registry.a3n.fr \
              -u "$REGISTRY_USER" --password-stdin

            docker compose pull

            # Extraire les fichiers statiques (Front/, public/) depuis l'image :prod
            # vers le volume app_files partagé avec nginx
            docker run --rm \
              -v wcdo_app_files:/dest \
              hugo-registry.a3n.fr/wcdo:prod \
              sh -c "cp -r /app/. /dest/"

            docker compose up -d

            sleep 15
            docker compose ps --filter status=running

  health-check:
    name: Health Check
    needs: deploy-vision
    runs-on: ubuntu-latest

    steps:
      - name: Wait for container to be ready
        run: sleep 10

      - name: Check app is responding
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            --max-time 30 \
            http://vision.a3n.fr/api/health || echo "000")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "App is up and running"

  merge-to-main:
    name: Merge prod into main
    needs: health-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Merge prod into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge origin/prod --ff-only
          git push origin main
