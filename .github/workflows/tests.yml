name: Tests & Quality Gates - Pull Request

on:
  pull_request:
    branches: [dev, prod, main]

jobs:
  quality:
    name: Quality Gates (lint + style + analyse)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: json, pdo, pdo_mysql
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.2-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-8.2-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Lint PHP (syntaxe)
        run: find src/ tests/ -name "*.php" -exec php -l {} \;

      - name: PHP-CS-Fixer (style PSR-12)
        run: ./vendor/bin/php-cs-fixer fix --dry-run --diff --config=.php-cs-fixer.php

      - name: PHPStan (analyse statique niveau 3)
        run: ./vendor/bin/phpstan analyse --memory-limit=256M

  test:
    name: PHPUnit PHP 8.2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: json, pdo, pdo_mysql
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.2-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-8.2-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Validate composer.json
        run: composer validate --no-check-lock --no-check-publish

      - name: Run PHPUnit tests
        run: ./vendor/bin/phpunit tests/
